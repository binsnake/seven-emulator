name: Docs Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "docs/**"
      - "include/**"
      - "src/iced_x86/src/**"
      - "tests/iced_x86/**"
      - "CMakeLists.txt"
      - "src/CMakeLists.txt"
      - "src/iced_x86/CMakeLists.txt"
      - "README.md"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Doxygen
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz

      - name: Configure
        run: cmake -S . -B build -DICEDCPP_BUILD_DOCS=ON -DICEDCPP_BUILD_TESTS=OFF

      - name: Build docs (HTML)
        run: cmake --build build --target docs_html -j

      - name: Add .nojekyll
        run: touch build/docs/out/html/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/docs/out/html

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-docs
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
